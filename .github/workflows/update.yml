name: Update emergency data

on:
  schedule:
    - cron: '*/15 * * * *'  # every 15 min — GitHub's scheduler doesn't guarantee exact timing under load
  workflow_dispatch: {}       # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch TPS + TFS, compute intelligence, write incidents.json
        run: python scripts/update_data.py

      - name: Fetch road restrictions
        run: python scripts/fetch_road_restrictions.py
        continue-on-error: true  # don't let this block the core incident pipeline

      - name: Fetch news + politician mentions
        run: python scripts/fetch_news.py
        continue-on-error: true  # same — news is a bonus layer, not core

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/incidents.json docs/data/geocode_cache.json docs/data/history_stats.json \
                   docs/data/road_restrictions.json docs/data/road_geocode_cache.json \
                   docs/data/news.json docs/data/news_geocode_cache.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "Update data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
